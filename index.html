function Quiz() {
  const [topicSelection, setTopicSelection] = useState([]);
  const [shuffle, setShuffle] = useState(false);
  const [started, setStarted] = useState(false);
  const [activeQs, setActiveQs] = useState([]);
  
  const [current, setCurrent] = useState(0);
  const [tempSelection, setTempSelection] = useState(null);
  const [answers, setAnswers] = useState({});
  const [showHintMap, setShowHintMap] = useState({});
  
  const [finished, setFinished] = useState(false);
  const [reviewMode, setReviewMode] = useState(false);
  const [reviewIndex, setReviewIndex] = useState(0);

  const topics = ["All", ...Array.from(new Set(questions.map(q => q.topic)))];

  // Sync temp selection when navigating back/forward
  const q = activeQs[current];
  const qAnswered = q && answers[q.id];

  const handleStart = () => {
    let filtered = topicSelection.length === 0 ? [...questions] : questions.filter(q => topicSelection.includes(q.topic));
    if (shuffle) {
      filtered = [...filtered].sort(() => Math.random() - 0.5);
    }
    setActiveQs(filtered);
    setAnswers({});
    setShowHintMap({});
    setCurrent(0);
    setTempSelection(null);
    setStarted(true);
    setFinished(false);
    setReviewMode(false);
  };

  const restart = () => {
    setStarted(false);
  };

  const handleSelect = (i) => {
    if (!qAnswered) setTempSelection(i);
  };

  const handleConfirm = () => {
    if (tempSelection === null) return;
    setAnswers(prev => ({
      ...prev,
      [q.id]: { selected: tempSelection, correct: tempSelection === q.ans }
    }));
  };

  const handleNext = () => {
    if (current + 1 >= activeQs.length) {
      setFinished(true);
    } else {
      setCurrent(c => c + 1);
      setTempSelection(answers[activeQs[current+1].id]?.selected ?? null);
    }
  };

  const handlePrev = () => {
    if (current > 0) {
      setCurrent(c => c - 1);
      setTempSelection(answers[activeQs[current-1].id]?.selected ?? null);
    }
  };

  const toggleHint = () => {
    setShowHintMap(prev => ({ ...prev, [q.id]: !prev[q.id] }));
  };

  if (!started) {
    return (
      <div className="min-h-screen bg-gray-50 p-4 flex flex-col items-center justify-center">
        <div className="w-full max-w-4xl bg-white rounded-3xl shadow-lg p-6 sm:p-10">
          <h2 className="text-5xl font-bold text-gray-800 mb-4 text-center">COMP2152</h2>
          <p className="text-center text-xl text-gray-500 mb-10">Python & Tools Study Quiz</p>
          
          <div className="mb-6">
            <label className="block text-base font-semibold text-gray-700 mb-3">Select Study Topics (leave empty for All):</label>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-60 overflow-y-auto p-3 border-2 border-gray-100 rounded-xl bg-gray-50">
              {topics.filter(t => t !== "All").map(t => (
                <label key={t} className="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-200 cursor-pointer transition-colors border border-transparent hover:border-gray-300">
                  <input 
                    type="checkbox" 
                    checked={topicSelection.includes(t)}
                    onChange={(e) => {
                      if (e.target.checked) setTopicSelection([...topicSelection, t]);
                      else setTopicSelection(topicSelection.filter(x => x !== t));
                    }}
                    className="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
                  />
                  <span className="text-sm font-medium text-gray-700">{t}</span>
                </label>
              ))}
            </div>
          </div>

          <div className="mb-8 flex items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
            <input 
              type="checkbox" 
              id="shuffle" 
              checked={shuffle} 
              onChange={e => setShuffle(e.target.checked)}
              className="w-5 h-5 text-blue-600 rounded border-gray-300 mr-3"
            />
            <label htmlFor="shuffle" className="text-sm font-semibold text-gray-700 cursor-pointer select-none">
              Mix up (shuffle) questions
            </label>
          </div>

          <button onClick={handleStart} className="w-full py-4 rounded-xl bg-blue-600 text-white font-bold text-lg shadow-md hover:bg-blue-700 transition-colors active:scale-95">
            Start Quiz
          </button>
        </div>
      </div>
    );
  }

  const score = Object.values(answers).filter(a => a.correct).length;

  if (reviewMode) {
    const revQ = activeQs[reviewIndex];
    const rAns = answers[revQ.id];
    return (
      <div className="min-h-screen bg-gray-50 p-4 flex flex-col items-center">
        <div className="w-full max-w-2xl bg-white rounded-2xl shadow-md p-6">
          <div className="flex justify-between items-center mb-4">
            <h2 className="text-lg font-bold text-gray-700">Review Mode</h2>
            <button onClick={() => setReviewMode(false)} className="text-sm text-blue-600 underline">← Back to results</button>
          </div>
          <div className="text-xs font-semibold mb-2">
            <span className={`px-2 py-1 rounded-full ${TOPIC_COLORS[revQ.topic] || "bg-gray-100 text-gray-700"}`}>{revQ.topic}</span>
          </div>
          <p className="font-semibold text-gray-800 mb-4">Q{reviewIndex+1}. {revQ.q}</p>
          <div className="space-y-2 mb-4">
            {revQ.opts.map((o, i) => {
              let cls = "border rounded-xl px-4 py-2 text-sm ";
              if (i === revQ.ans) cls += "bg-green-100 border-green-400 text-green-800 font-semibold";
              else if (rAns && i === rAns.selected && !rAns.correct) cls += "bg-red-100 border-red-400 text-red-800";
              else cls += "border-gray-200 text-gray-600";
              return <div key={i} className={cls}>{o}</div>;
            })}
          </div>
          <div className={`text-sm font-semibold mb-4 ${rAns?.correct ? "text-green-700" : "text-red-700"}`}>
            {rAns?.correct ? "✅ Correct!" : `❌ Incorrect — Correct answer: "${revQ.opts[revQ.ans]}"`}
          </div>
          <div className="flex justify-between">
            <button disabled={reviewIndex===0} onClick={() => setReviewIndex(i => i-1)} className="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 disabled:opacity-30 text-sm">← Prev</button>
            <span className="text-xs text-gray-400 self-center">{reviewIndex+1} / {activeQs.length}</span>
            <button disabled={reviewIndex===activeQs.length-1} onClick={() => setReviewIndex(i => i+1)} className="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 disabled:opacity-30 text-sm">Next →</button>
          </div>
        </div>
      </div>
    );
  }

  if (finished) {
    const pct = Math.round((score / activeQs.length) * 100);
    const topicStats = {};
    activeQs.forEach(q => {
      if (!topicStats[q.topic]) topicStats[q.topic] = { correct: 0, total: 0 };
      topicStats[q.topic].total++;
      if (answers[q.id]?.correct) topicStats[q.topic].correct++;
    });
    return (
      <div className="min-h-screen bg-gray-50 p-4 flex flex-col items-center">
        <div className="w-full max-w-2xl bg-white rounded-2xl shadow-md p-6">
          <h2 className="text-2xl font-bold text-center text-gray-800 mb-1">Quiz Complete! 🎉</h2>
          <p className="text-center text-gray-500 mb-4 text-sm">COMP2152 Python & Tools Study Quiz</p>
          <div className="text-center mb-4">
            <span className="text-5xl font-bold" style={{color: pct>=80?"#16a34a":pct>=60?"#d97706":"#dc2626"}}>{pct}%</span>
            <p className="text-gray-600 mt-1">{score} / {activeQs.length} correct</p>
          </div>
          <div className="w-full bg-gray-200 rounded-full h-3 mb-6">
            <div className="h-3 rounded-full" style={{width:`${pct}%`, background: pct>=80?"#16a34a":pct>=60?"#d97706":"#dc2626"}}></div>
          </div>
          <h3 className="font-semibold text-gray-700 mb-2">Performance by Topic</h3>
          <div className="space-y-2 mb-6">
            {Object.entries(topicStats).map(([t, s]) => {
              const tp = Math.round((s.correct/s.total)*100);
              return (
                <div key={t} className="flex items-center gap-2">
                  <span className={`text-xs px-2 py-0.5 rounded-full shrink-0 ${TOPIC_COLORS[t]||"bg-gray-100 text-gray-700"}`}>{t}</span>
                  <div className="flex-1 bg-gray-100 rounded-full h-2">
                    <div className="h-2 rounded-full" style={{width:`${tp}%`, background:tp>=80?"#16a34a":tp>=60?"#d97706":"#dc2626"}}></div>
                  </div>
                  <span className="text-xs text-gray-500 shrink-0">{s.correct}/{s.total}</span>
                </div>
              );
            })}
          </div>
          <div className="flex gap-3">
            <button onClick={() => { setReviewMode(true); setReviewIndex(0); }} className="flex-1 py-2 rounded-xl border-2 border-blue-500 text-blue-600 font-semibold text-sm">Review Answers</button>
            <button onClick={restart} className="flex-1 py-2 rounded-xl bg-blue-600 text-white font-semibold text-sm">Start New Quiz</button>
          </div>
        </div>
      </div>
    );
  }

  const ansCount = Object.keys(answers).length;
  const isSelected = tempSelection !== null;
  const showHint = showHintMap[q.id];

  return (
    <div className="min-h-screen bg-gray-50 p-4 flex flex-col items-center">
      <div className="w-full max-w-4xl mt-6">
        {/* Header */}
        <div className="flex justify-between items-center mb-4">
          <button onClick={restart} className="text-sm font-semibold text-gray-500 hover:text-gray-800">← Back to Menu</button>
        </div>
        <div className="mb-4">
          <div className="flex justify-between items-center mb-1">
            <span className="text-sm text-gray-500 font-medium">{topicSelection.length === 0 ? "All Topics" : topicSelection.length === 1 ? topicSelection[0] : "Mixed Topics"} Quiz</span>
            <span className="text-sm text-gray-500 font-bold">{current+1} / {activeQs.length}</span>
          </div>
          <div className="w-full bg-gray-200 rounded-full h-2">
            <div className="h-2 rounded-full bg-blue-500 transition-all" style={{width:`${((current)/activeQs.length)*100}%`}}></div>
          </div>
          <div className="flex justify-between mt-1">
            <span className="text-xs text-green-600 font-medium">✓ {Object.values(answers).filter(a=>a.correct).length} correct</span>
            <span className="text-xs text-red-500 font-medium">✗ {Object.values(answers).filter(a=>!a.correct).length} wrong</span>
          </div>
        </div>

        {/* Card */}
        <div className="bg-white rounded-2xl shadow-md p-6 relative">
          <div className="mb-3 flex justify-between items-center">
            <span className={`text-xs font-semibold px-2 py-1 rounded-full ${TOPIC_COLORS[q.topic]||"bg-gray-100 text-gray-700"}`}>{q.topic}</span>
            {qAnswered && <span className="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded-md">Answered</span>}
          </div>
          <p className="text-gray-800 font-bold text-lg mb-5 leading-relaxed">{q.q}</p>

          <div className="space-y-3 mb-5">
            {q.opts.map((o, i) => {
              let cls = "w-full text-left border-2 rounded-xl px-4 py-3 text-base transition-all ";
              if (!qAnswered) {
                cls += tempSelection === i
                  ? "border-blue-500 bg-blue-50 text-blue-800 font-medium shadow-sm"
                  : "border-gray-200 hover:border-blue-300 hover:bg-gray-50 text-gray-700 cursor-pointer";
              } else {
                if (i === q.ans) cls += "border-green-500 bg-green-50 text-green-800 font-semibold";
                else if (i === qAnswered.selected && qAnswered.selected !== q.ans) cls += "border-red-400 bg-red-50 text-red-700";
                else cls += "border-gray-100 text-gray-400";
              }
              return (
                <button key={i} className={cls} onClick={() => handleSelect(i)}>
                  <span className="font-bold mr-2">{["A","B","C","D"][i]}.</span>{o}
                </button>
              );
            })}
          </div>

          {/* Hint */}
          {!qAnswered && (
            <button onClick={toggleHint} className="text-xs text-amber-600 underline mb-3 font-medium">
              {showHint ? "Hide hint" : "💡 Show hint"}
            </button>
          )}
          {showHint && !qAnswered && (
            <div className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-2 text-sm text-amber-800 mb-3">{q.hint}</div>
          )}

          {/* Feedback */}
          {qAnswered && (
            <div className={`rounded-lg px-4 py-3 text-sm font-semibold mb-4 ${tempSelection===q.ans?"bg-green-50 text-green-700 border border-green-200":"bg-red-50 text-red-700 border border-red-200"}`}>
              {tempSelection===q.ans ? "✅ Correct!" : `❌ Incorrect. The answer is: "${q.opts[q.ans]}"`}
              <div className="text-xs font-normal mt-1 opacity-80">{q.hint}</div>
            </div>
          )}

          {/* Buttons: Prev, Confirm, Next */}
          <div className="flex gap-3 mt-4">
            <button 
              onClick={handlePrev} 
              disabled={current === 0} 
              className="px-5 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold disabled:opacity-30 disabled:invisible text-base hover:bg-gray-200 transition-colors"
            >
              ← Prev
            </button>
            
            {!qAnswered ? (
              <button onClick={handleConfirm} disabled={!isSelected} className="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold disabled:opacity-50 text-base hover:bg-blue-700 transition-colors shadow-sm">
                Confirm Answer
              </button>
            ) : (
              <button onClick={handleNext} className="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold text-base hover:bg-blue-700 transition-colors shadow-sm">
                {current+1 >= activeQs.length ? "See Results 🎉" : "Next Question →"}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Quiz />);
    </script>
</body>
</html>
